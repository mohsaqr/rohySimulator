# Release artifacts — one tag, two formats, both downloadable.
#
# What an operator gets per release:
#
#   Option A (docker, smaller, simplest target):
#     ghcr.io/<owner>/rohy:v0.1.0    (multi-arch where the runner supports it)
#     ghcr.io/<owner>/rohy:latest
#     Operator:  docker pull ghcr.io/<owner>/rohy:v0.1.0
#                docker compose -f deploy/docker/compose.yml up -d
#                (compose can pull-by-digest for byte-identical deploys)
#
#   Option B (single tarball, no Docker on target):
#     rohy-airgap-source-<sha>-<platform>-<date>.tar.gz       (~1.8 GB)
#     rohy-airgap-source-<sha>-<platform>-<date>.tar.gz.sha256
#     Operator:  curl -L -o rohy.tar.gz <release-url>
#                sha256sum -c rohy.tar.gz.sha256
#                tar xzf rohy.tar.gz && cd rohy-airgap-*
#                sudo ./airgap-install.sh --frontend-url=https://your-host
#
#   Option C (Docker-image tarball, for air-gapped sites with Docker but
#   no internet):
#     rohy-airgap-docker-<sha>-<platform>-<date>.tar.gz
#     Operator:  curl -L | docker load
#                docker compose up -d
#
# All artifacts get attached to the GitHub Release page automatically.
# Trigger: push a tag matching v* (e.g. `git tag v0.1.0 && git push --tags`).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write       # to create the Release + upload assets
  packages: write       # to push the image to ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-build

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rohy

jobs:
  # ----------------------------------------------------------------------
  # Docker image → ghcr.io. Smallest download for operators with Docker.
  # Multi-arch: linux/amd64 always; linux/arm64 if the runner supports it.
  # ----------------------------------------------------------------------
  docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}
            ${{ env.IMAGE }}:latest
          # Cache from previous builds so re-tags / re-runs are fast,
          # but never trust the cache for the actual emitted layers —
          # the nightly install-from-scratch workflow already verifies
          # clean builds.
          cache-from: type=gha,scope=release
          cache-to: type=gha,scope=release,mode=max

      - name: Summary
        run: |
          echo "## Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "    docker pull ${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "    docker pull ${{ env.IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------------
  # Source bundle (one tarball, everything inside). For operators who
  # don't run Docker or who want byte-exact reproducibility per release.
  # Built on a x86_64 runner; for arm64 targets, run bundle-airgap.sh
  # locally on an arm64 host (the script enforces platform match at
  # install time). Could be matrixed across runners later.
  # ----------------------------------------------------------------------
  airgap-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install build prereqs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              rsync python3-venv sqlite3 jq

      - name: Install npm deps (incl. download-models postinstall)
        run: npm ci --prefer-offline --no-audit --no-fund

      # Bundler defaults: source mode, no HF cache (saves ~330 MB; Kokoro
      # downloads on first request anyway), no Piper (saves ~326 MB; Piper
      # is opt-in TTS), no dynajs sibling (not needed when OyonR
      # standalone/vendor/dynajs is already tracked in-repo). Operators
      # who need any of the above can rebuild with `--with-*` flags.
      - name: Build air-gap source tarball
        run: |
          bash deploy/bundle-airgap.sh --mode=source --output=dist/airgap
          ls -la dist/airgap/

      - name: Verify sha256
        run: |
          cd dist/airgap
          for f in *.tar.gz; do
            sha256sum -c "${f}.sha256"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          fail_on_unmatched_files: true
          # The bundler writes its manifest.json INSIDE each tarball at
          # the root (deploy/bundle-airgap.sh:416), not as a sibling
          # file. Operators reading what's in a bundle look at
          # `tar tzf foo.tar.gz | grep manifest.json` — no separate
          # sidecar to upload here.
          files: |
            dist/airgap/*.tar.gz
            dist/airgap/*.sha256
          body: |
            ## Install paths for this release

            ### Option A — Docker (smallest, simplest)

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/rohy:${{ steps.tag.outputs.ref }}
            docker compose -f deploy/docker/compose.yml up -d
            ```

            ### Option B — Air-gap tarball (zero-network target)

            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.ref }}/rohy-airgap-source-*.tar.gz
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.ref }}/rohy-airgap-source-*.tar.gz.sha256
            sha256sum -c rohy-airgap-source-*.tar.gz.sha256
            tar xzf rohy-airgap-source-*.tar.gz
            cd rohy-airgap-*
            sudo ./airgap-install.sh --frontend-url=https://your-host
            ```

            Platform lock: the source tarball is built for `linux-amd64`.
            For other platforms, run `deploy/bundle-airgap.sh --mode=source`
            on a build host matching the target's OS+arch.

            ### Verification

            Every artifact ships with a `.sha256` sidecar. Verify before
            installing — especially on air-gapped sites.

            ---

            See [docs/INSTALL.md](https://github.com/${{ github.repository }}/blob/main/docs/INSTALL.md)
            for the full install reference and
            [docs/DEPLOY.md](https://github.com/${{ github.repository }}/blob/main/docs/DEPLOY.md)
            for production hardening.

      - name: Summary
        run: |
          echo "## Air-gap bundle published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in dist/airgap/*.tar.gz; do
            size=$(du -h "$f" | cut -f1)
            echo "- \`$(basename $f)\` (${size})" >> $GITHUB_STEP_SUMMARY
          done

  # ----------------------------------------------------------------------
  # Post-publish verification — pull the image WE JUST PUSHED and prove
  # an operator on a fresh machine can boot it cleanly.
  #
  # Why this matters: the docker-image job confirms `docker build && docker
  # push` worked. That's not the same as "an operator pulling the published
  # tag gets a working install." Manifest issues, missing entrypoint, wrong
  # env defaults, layer order bugs — all surface only when the image is
  # consumed, not when it's produced. This job runs the consumer side as
  # if it were a stranger on a fresh box: pulls by tag, runs it, hits
  # /api/health, and runs the full tech-test.sh suite.
  #
  # On red: the release page already exists at this point (artifacts
  # uploaded by airgap-bundle / docker-tarball), so we don't auto-revoke.
  # Operators should see this red mark on the release notes and pin to
  # the last green version.
  # ----------------------------------------------------------------------
  verify-published-image:
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the published image (same command an operator runs)
        run: |
          docker pull ${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}
          docker image inspect ${{ env.IMAGE }}:${{ steps.tag.outputs.ref }} \
            --format '{{.Architecture}} {{.Os}} size={{.Size}}'

      - name: Boot the container as if on a fresh box
        run: |
          docker run -d \
            --name rohy-verify \
            -p 4000:4000 \
            -e JWT_SECRET="$(openssl rand -hex 32)" \
            -e NODE_ENV=production \
            -e FRONTEND_URL=http://localhost:4000 \
            -e ALLOW_DEFAULT_USERS=1 \
            -e OYON_ENABLED=1 \
            ${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:4000/api/health > /dev/null 2>&1; then
              echo "✓ healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          docker logs rohy-verify
          exit 1

      - name: Run tech-test.sh against the published image
        run: ROHY_VERBOSE=1 bash scripts/tech-test.sh http://localhost:4000

      - name: Verify the standalone assets actually serve
        run: |
          # Same probe list as install-from-scratch.yml — if any returns
          # non-200 here, the published image is broken from an
          # operator's POV regardless of what CI thinks.
          MISSING=0
          for p in \
              standalone/ \
              standalone/logs.html \
              standalone/vendor/onnxruntime-web/ort.min.mjs \
              standalone/vendor/onnxruntime-web/ort-wasm-simd-threaded.mjs \
              standalone/vendor/onnxruntime-web/ort-wasm-simd-threaded.wasm \
              standalone/vendor/onnxruntime-web/ort-wasm-simd-threaded.asyncify.mjs \
              standalone/vendor/onnxruntime-web/ort-wasm-simd-threaded.asyncify.wasm \
              standalone/vendor/mediapipe/vision_bundle.mjs \
              standalone/vendor/dynajs/index.js \
              standalone/vendor/rohy-tna/NetworkGraph.js \
              standalone/models/face_landmarker.task \
              standalone/models/emotion/enet_b0_8_va_mtl.onnx ; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "http://localhost:4000/$p")
            if [ "$code" != "200" ]; then
              echo "  ✗ /$p → $code"
              MISSING=$((MISSING+1))
            else
              echo "  ✓ /$p"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "$MISSING asset(s) missing — published image is incomplete"
            exit 1
          fi

      - name: Container logs on failure
        if: failure()
        run: |
          echo "=== docker logs rohy-verify (last 200 lines) ==="
          docker logs --tail 200 rohy-verify || true

      - name: Tear down
        if: always()
        run: |
          docker stop rohy-verify 2>/dev/null || true
          docker rm rohy-verify 2>/dev/null || true

      - name: Summary
        if: success()
        run: |
          echo "## Published image verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}\` boots, answers /api/health, passes all tech-test.sh probes, and serves every standalone asset operators import." >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------------
  # Docker-as-tarball (for air-gapped sites that have Docker but no
  # internet). Smaller than the source bundle because it doesn't include
  # node_modules separately — it's all inside the image layers.
  # ----------------------------------------------------------------------
  docker-tarball:
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR (to pull the just-pushed image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull + save image to tarball
        run: |
          PLATFORM=linux-amd64
          STAMP="$(git rev-parse --short HEAD)-${PLATFORM}-$(date -u +%Y%m%d)"
          OUT="dist/airgap"
          TARBALL="$OUT/rohy-airgap-docker-${STAMP}.tar.gz"
          mkdir -p "$OUT"
          docker pull "${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}"
          docker save "${{ env.IMAGE }}:${{ steps.tag.outputs.ref }}" | gzip > "$TARBALL"
          ( cd "$OUT" && sha256sum "$(basename "$TARBALL")" > "$(basename "$TARBALL").sha256" )
          ls -la "$OUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          fail_on_unmatched_files: true
          files: |
            dist/airgap/rohy-airgap-docker-*.tar.gz
            dist/airgap/rohy-airgap-docker-*.tar.gz.sha256

      - name: Summary
        run: |
          echo "## Docker-as-tarball published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in dist/airgap/rohy-airgap-docker-*.tar.gz; do
            size=$(du -h "$f" | cut -f1)
            echo "- \`$(basename $f)\` (${size})" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Operator install on air-gapped target:" >> $GITHUB_STEP_SUMMARY
          echo "    curl -L <release-url> | docker load" >> $GITHUB_STEP_SUMMARY
          echo "    docker compose -f deploy/docker/compose.yml up -d" >> $GITHUB_STEP_SUMMARY
